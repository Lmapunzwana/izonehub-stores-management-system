services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: stores
      POSTGRES_USER: stores
      POSTGRES_PASSWORD: stores
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stores -d stores"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stores
      SPRING_DATASOURCE_USERNAME: stores
      SPRING_DATASOURCE_PASSWORD: stores
      JWT_SECRET: local-development-secret-key-change-before-deployment-123
      # Allow requests from the Next.js frontend (both dev and prod containers)
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      COOKIE_SECURE: "false"       # HTTP-only in local dev; override to true in prod
      COOKIE_DOMAIN: ""

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Spring Boot takes ~50-60s to boot — start_period gives it room
      # before failed checks count against retries.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 75s

  frontend:
    build:
      context: ./frontend
      args:
        # Baked in at `next build` time -- see comment in frontend/Dockerfile.
        # Runtime env below is harmless but does NOT affect the compiled rewrite.
        BACKEND_URL: http://backend:8080
    environment:
      BACKEND_URL: http://backend:8080
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

