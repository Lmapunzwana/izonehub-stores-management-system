services:
  postgres:
    image: postgres:15-alpine
    environment: { POSTGRES_DB: stores, POSTGRES_USER: stores, POSTGRES_PASSWORD: stores }
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stores
      SPRING_DATASOURCE_USERNAME: stores
      SPRING_DATASOURCE_PASSWORD: stores
      JWT_SECRET: local-development-secret-key-change-before-deployment-123
    ports: ["8080:8080"]
    depends_on: [postgres]
volumes: { postgres-data: {} }
