apiVersion: apps/v1
kind: Deployment
metadata:
  name: stores-frontend
  labels:
    app: stores-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stores-frontend
  template:
    metadata:
      labels:
        app: stores-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/izonehub/stores-management-system/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: http://stores-backend:80
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: stores-frontend
spec:
  selector:
    app: stores-frontend
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stores-ingress
  annotations:
    # cert-manager issues a Let's Encrypt TLS certificate automatically
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Redirect all HTTP to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Pass real client IP through
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    # 10 MB body limit — sufficient for all API payloads
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stores.newsaharaventures.com
      secretName: stores-tls
  rules:
    - host: stores.newsaharaventures.com
      http:
        paths:
          # All traffic goes to the Next.js frontend; it proxies /api/* to backend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stores-frontend
                port:
                  number: 80
