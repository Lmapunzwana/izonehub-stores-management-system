apiVersion: apps/v1
kind: Deployment
metadata: { name: stores-backend }
spec:
  replicas: 2
  selector: { matchLabels: { app: stores-backend } }
  template:
    metadata: { labels: { app: stores-backend } }
    spec:
      containers:
        - name: backend
          image: ghcr.io/izonehub/stores-management-system/backend:latest
          ports: [{ containerPort: 8080 }]
          envFrom: [{ secretRef: { name: stores-backend-secrets } }]
          readinessProbe: { httpGet: { path: /actuator/health, port: 8080 }, initialDelaySeconds: 20, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: stores-backend }
spec:
  selector: { app: stores-backend }
  ports: [{ port: 80, targetPort: 8080 }]
