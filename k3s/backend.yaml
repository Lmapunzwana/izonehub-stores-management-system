apiVersion: apps/v1
kind: Deployment
metadata:
  name: stores-backend
  labels:
    app: stores-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stores-backend
  template:
    metadata:
      labels:
        app: stores-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/izonehub/stores-management-system/backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: stores-backend-secrets
          env:
            # Cookies must be Secure in production (HTTPS)
            - name: COOKIE_SECURE
              value: "true"
            - name: COOKIE_DOMAIN
              value: stores.nvs.co.zw
            # Only the frontend origin is allowed for CORS
            - name: CORS_ALLOWED_ORIGINS
              value: https://stores.nvs.co.zw
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: stores-backend
spec:
  selector:
    app: stores-backend
  ports:
    - port: 80
      targetPort: 8080
