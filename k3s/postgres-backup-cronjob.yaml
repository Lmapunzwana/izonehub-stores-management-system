apiVersion: batch/v1
kind: CronJob
metadata: { name: stores-postgres-backup }
spec:
  schedule: "0 22 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:15-alpine
              envFrom: [{ secretRef: { name: stores-backend-secrets } }]
              command: ["/bin/sh", "-c"]
              args:
                - pg_dump "$BACKUP_DATABASE_URL" --file=/backup/stores-$(date +%F).sql
              volumeMounts:
                - { name: backup, mountPath: /backup }
          volumes:
            - name: backup
              persistentVolumeClaim: { claimName: stores-postgres-backup }
