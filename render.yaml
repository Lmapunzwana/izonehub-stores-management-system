databases:
  # 1. PostgreSQL Database
  - name: stores-db
    plan: free # or 'starter' depending on your Render plan
    databaseName: stores
    user: stores

services:

  # 2. Unified Web Service (Frontend + Backend in one)
  - type: web
    name: stores-app
    env: docker
    dockerfilePath: ./Dockerfile.render
    plan: free # or 'starter'
    healthCheckPath: /actuator/health
    envVars:
      # Automatically connect to the Render PostgreSQL database
      - key: DB_HOST
        fromDatabase:
          name: stores-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: stores-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: stores-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: stores-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: stores-db
          property: password
          
      # Security Keys
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      
      # Demo Company Details
      - key: COMPANY_NAME
        value: "New Sahara Ventures (Pvt) Ltd"
      - key: COMPANY_EMAIL
        value: "info@newsaharaventures.com"
        
      # Emails
      - key: APP_EMAIL_PROVIDER
        value: "resend"
      - key: APP_EMAIL_FROM
        value: "notifications@talksal.co.zw"
      # IMPORTANT: Add RESEND_API_KEY manually in the Render Dashboard under Environment Variables. Do not hardcode it here.
