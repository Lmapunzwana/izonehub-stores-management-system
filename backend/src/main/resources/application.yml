spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stores}
    username: ${SPRING_DATASOURCE_USERNAME:stores}
    password: ${SPRING_DATASOURCE_PASSWORD:stores}
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  company:
    name: ${COMPANY_NAME:New Sahara Ventures (Pvt) Ltd}
    address-line1: ${COMPANY_ADDRESS_LINE1:43 Coull Drive, Mount Pleasant, Harare}
    address-line2: ${COMPANY_ADDRESS_LINE2:Zimbabwe}
    phone: ${COMPANY_PHONE:+263 242 301 279 / +263 773 436 391}
    email: ${COMPANY_EMAIL:info@newsaharaventures.com}
    website: ${COMPANY_WEBSITE:www.newsaharaventures.com}
    logo-classpath: ${COMPANY_LOGO_CLASSPATH:logo.jpeg}
    brand-color: ${COMPANY_BRAND_COLOR:#1F7A3D}

  # Email / Notification
  # provider: logging (default/no-op), resend (Resend.com), ses (AWS SES)
  # For Resend: set APP_EMAIL_PROVIDER=resend and RESEND_API_KEY=re_xxxx
  email:
    provider: ${APP_EMAIL_PROVIDER:resend}
    from-address: ${APP_EMAIL_FROM:notifications@talksal.co.zw}
    resend-api-key: ${RESEND_API_KEY:}
    ses-region: ${APP_EMAIL_SES_REGION:us-east-1}

  jwt:
    issuer: izonehub-stores
    secret: ${JWT_SECRET:dev-only-secret-key-must-be-overridden-and-longer-than-32-bytes}
    access-token-minutes: 15
    refresh-token-days: 7

  security:
    max-failed-logins: 5
    login-rate-limit-attempts: 10
    login-rate-limit-minutes: 15
    cookie-secure: ${COOKIE_SECURE:true}
    cookie-domain: ${COOKIE_DOMAIN:}
    cookie-same-site: Strict

  csp: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
